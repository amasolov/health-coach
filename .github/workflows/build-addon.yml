name: Build and Push Addon Image

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - "db/**"
      - "grafana/**"
      - ".chainlit/**"
      - "public/**"
      - "chainlit.md"
      - "requirements.txt"
      - "healthcoach/**"
  workflow_dispatch:

jobs:
  build:
    name: Build multi-arch image
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract addon version
        id: version
        run: |
          echo "version=$(grep '^version:' healthcoach/config.yaml | sed 's/version:[[:space:]]*//' | tr -d '\"')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: healthcoach/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: BUILD_FROM=python:3.12-alpine
          tags: |
            ghcr.io/amasolov/health-coach/healthcoach:latest
            ghcr.io/amasolov/health-coach/healthcoach:${{ steps.version.outputs.version }}
            ghcr.io/amasolov/health-coach/healthcoach:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true
