name: Build and Push Addon Image

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - "db/**"
      - "grafana/**"
      - ".chainlit/**"
      - "public/**"
      - "chainlit.md"
      - "requirements.txt"
      - "healthcoach/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/amasolov/health-coach/healthcoach
  BUILD_FROM: python:3.12-alpine@sha256:7747d47f92cfca63a6e2b50275e23dba8407c30d8ae929a88ddd49a5d3f2d331

jobs:
  build:
    name: Build multi-arch image
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Extract addon version
        id: version
        run: |
          echo "version=$(grep '^version:' healthcoach/config.yaml | sed 's/version:[[:space:]]*//' | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build multi-arch images
        run: |
          for ARCH in arm64 amd64; do
            echo "=== Building linux/${ARCH} ==="
            podman build \
              --platform "linux/${ARCH}" \
              --build-arg "BUILD_FROM=${BUILD_FROM}" \
              --layers --cache-ttl=168h \
              -f healthcoach/Dockerfile \
              -t "${IMAGE}:${ARCH}" \
              .
          done

      - name: Push images and manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          for ARCH in arm64 amd64; do
            echo "=== Pushing ${IMAGE}:${ARCH} ==="
            podman push "${IMAGE}:${ARCH}" "docker://${IMAGE}:${ARCH}"
          done

          for TAG in latest "${VERSION}" "${{ github.sha }}"; do
            echo "=== Creating manifest ${IMAGE}:${TAG} ==="
            podman manifest rm "${IMAGE}:${TAG}" 2>/dev/null || true
            podman manifest create "${IMAGE}:${TAG}" \
              "${IMAGE}:arm64" \
              "${IMAGE}:amd64"
            podman manifest push "${IMAGE}:${TAG}" "docker://${IMAGE}:${TAG}"
          done

      - name: Logout
        if: always()
        run: podman logout ghcr.io 2>/dev/null || true
