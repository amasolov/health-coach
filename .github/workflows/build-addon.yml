name: Build and Push Addon Image

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - "db/**"
      - "grafana/**"
      - ".chainlit/**"
      - "public/**"
      - "chainlit.md"
      - "requirements.txt"
      - "healthcoach/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/amasolov/health-coach/healthcoach
  BUILD_FROM: python:3.12-alpine

jobs:
  build:
    name: Build multi-arch image
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract addon version
        id: version
        run: |
          echo "version=$(grep '^version:' healthcoach/config.yaml | sed 's/version:[[:space:]]*//' | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push multi-arch manifest
        run: |
          MANIFEST="${IMAGE}:latest"
          VERSION_TAG="${IMAGE}:${{ steps.version.outputs.version }}"
          SHA_TAG="${IMAGE}:${{ github.sha }}"

          podman manifest rm "${MANIFEST}" 2>/dev/null || true

          for ARCH in arm64 amd64; do
            echo "=== Building linux/${ARCH} ==="
            podman build \
              --platform "linux/${ARCH}" \
              --build-arg "BUILD_FROM=${BUILD_FROM}" \
              --layers --cache-ttl=168h \
              -f healthcoach/Dockerfile \
              -t "${IMAGE}:${ARCH}" \
              .
          done

          echo "=== Creating manifest ==="
          podman manifest create "${MANIFEST}"
          podman manifest add "${MANIFEST}" "${IMAGE}:arm64"
          podman manifest add "${MANIFEST}" "${IMAGE}:amd64"

          echo "=== Pushing ==="
          podman manifest push --all "${MANIFEST}" "docker://${MANIFEST}"
          podman manifest push --all "${MANIFEST}" "docker://${VERSION_TAG}"
          podman manifest push --all "${MANIFEST}" "docker://${SHA_TAG}"

      - name: Logout
        if: always()
        run: podman logout ghcr.io 2>/dev/null || true
