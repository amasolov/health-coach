name: Build and Push Addon Image

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - "db/**"
      - "grafana/**"
      - ".chainlit/**"
      - "public/**"
      - "chainlit.md"
      - "requirements.txt"
      - "ha-addon/health-tracker/**"
  workflow_dispatch:

jobs:
  build:
    name: Build multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ha-addon/health-tracker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: BUILD_FROM=python:3.12-alpine
          tags: |
            ghcr.io/amasolov/alexeym-health/health-tracker:latest
            ghcr.io/amasolov/alexeym-health/health-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
