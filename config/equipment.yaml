# Equipment Inventory & Sensor Configuration
# Reference for data sources, sensor pairing, and workout capabilities.

wearables:
  - name: Garmin Fenix 8
    type: gps_watch
    sensors: [optical_hr, barometric_alt, gps, spo2, temperature]
    data_targets: [garmin_connect, strava]
    notes: "Primary outdoor training device"

  - name: Garmin HRM Pro
    type: chest_strap
    sensors: [hr, running_dynamics, running_power_garmin]
    pairs_with: [garmin_fenix_8, garmin_edge_1030]
    notes: "Use for all structured workouts for accurate HR"

  - name: Stryd
    type: foot_pod
    sensors: [running_power, cadence, ground_contact, leg_spring_stiffness]
    pairs_with: [garmin_fenix_8]
    data_targets: [stryd_app, garmin_connect]
    notes: "Primary running power source (preferred over Garmin running power)"

cycling:
  - name: Garmin Edge 1030
    type: bike_computer
    sensors: [gps, barometric_alt]
    pairs_with: [garmin_hrm_pro, wahoo_kickr]
    data_targets: [garmin_connect, strava, zwift]
    notes: "Outdoor cycling head unit"

  - name: Wahoo Kickr Smart Bike
    type: smart_trainer
    sensors: [power, cadence, speed]
    protocols: [ant_plus, bluetooth]
    data_targets: [zwift, garmin_connect]
    notes: "Indoor cycling with direct power measurement"

treadmill:
  - name: NordicTrack x22i
    type: treadmill
    sensors: [speed, incline, npd_power]
    max_incline_pct: 40
    max_decline_pct: -6
    max_speed_kph: 22.5
    data_targets: [ifit]
    notes: "Primary indoor running. NPD sensor for treadmill power data."

health_monitoring:
  - name: Garmin Smart Scale
    type: scale
    sensors: [weight, body_fat, muscle_mass, bone_mass, bmi, body_water]
    data_targets: [garmin_connect]
    frequency: daily
    notes: "Weigh at same time each morning for consistency"

  - name: Garmin Blood Pressure Monitor
    type: blood_pressure
    sensors: [systolic, diastolic, pulse]
    data_targets: [garmin_connect]
    frequency: "2x daily (morning + evening) during baseline, then as needed"

gym:
  - name: Resistance bands
    type: bands
    notes: "Warmup, activation, rehab"

  - name: Kettlebells
    type: kettlebell
    weights_kg: [12, 20]
    notes: "Swings, goblet squats, TGU, carries"

  - name: Dumbbell set
    type: dumbbells
    notes: "Supplementary strength work"

  - name: Squat rack
    type: rack
    includes: [barbell, plate_set]
    missing: [bench]
    notes: "Squats, deadlifts, overhead press, rows. No bench press -- use floor press or DB alternatives."

software:
  - name: Garmin Connect
    type: platform
    role: "Central health data hub -- HR, HRV, sleep, stress, body battery, activities"

  - name: Strava
    type: platform
    role: "Social, route planning, segment tracking"

  - name: Hevy
    type: app
    role: "Strength training logging (sets, reps, weight, RPE)"

  - name: iFit
    type: subscription
    role: "Guided treadmill workouts on NordicTrack x22i"
    notes: "Good variety but unstructured -- need to select based on zone targets"

  - name: Zwift
    type: platform
    role: "Indoor cycling and running with structured workouts and social riding"
