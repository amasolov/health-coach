# Athlete configuration template.
# Copy this file to /config/health-tracker/athlete.yaml on your Home Assistant host
# and fill in your details. The addon will pick it up automatically on next start.
#
# Multiple users are supported -- add additional slugs under "users:".
# The slug must match the "slug" field in the addon's user configuration.

users:
  yourname:                          # replace with your addon user slug
    profile:
      name: Your Name
      date_of_birth: '1990-01-01'    # YYYY-MM-DD
      sex: male                      # male | female | other
      height_cm: 175.0
      timezone: UTC                  # e.g. America/New_York, Europe/London, Australia/Sydney
    thresholds:
      last_tested: null
      heart_rate:
        max_hr: null                 # beats per minute
        resting_hr: null
        lthr_run: null               # lactate threshold HR for running
        lthr_bike: null
      running:
        critical_power: null         # watts (Garmin/Stryd native running power)
        threshold_pace: null         # min/km, e.g. 5.5
        vo2max_garmin: null
        vo2max_lab: null
      cycling:
        ftp: null                    # watts
        ftp_wkg: null                # watts per kg
      lactate:
        lt1_hr: null
        lt1_pace: null
        lt2_hr: null
        lt2_pace: null
        test_protocol: null
        test_date: null
    body:
      weight_kg: null
      body_fat_pct: null
      muscle_mass_kg: null
      bone_mass_kg: null
      bmi: null
      measured_date: null
      source: garmin_scale           # garmin_scale | manual
    goals:
      primary_goal: null
      target_event: null
      target_date: null
      secondary_goals: []
      available_hours_per_week: null
      preferred_sports:
        - running
        - cycling
        - strength training
      constraints: []
      experience_level: intermediate  # beginner | intermediate | advanced
      training_preferences:
        likes: null
        dislikes: null
    training_status:
      weekly_volume_hrs: null
      longest_run_km: null
      longest_ride_km: null
      strength_sessions_per_week: null
      current_phase: null
    action_items: []
    ifit:
      favourite_trainers: []
      available_equipment: []
      preferred_duration_min: [20, 45]
      min_rating: 4.0
      software_number: null
    treadmill:
      zone_speed_map:
        z1_recovery:
          speed_kph: null
          incline_pct: 1.0
        z2_aerobic:
          speed_kph: null
          incline_pct: 1.0
        z3_tempo:
          speed_kph: null
          incline_pct: 1.0
        z4_threshold:
          speed_kph: null
          incline_pct: 1.0
        z5_vo2max:
          speed_kph: null
          incline_pct: 1.0
      hill_map:
        z2_hills:
          speed_kph: null
          incline_pct: 8.0
        z3_hills:
          speed_kph: null
          incline_pct: 12.0
        z4_hills:
          speed_kph: null
          incline_pct: 15.0
