name: Health Coach
version: "0.34.3"
slug: healthcoach
description: >-
  AI-powered personal health and fitness coach.
  Syncs Garmin Connect and Hevy data to TimescaleDB,
  calculates PMC (CTL/ATL/TSB), provisions Grafana dashboards,
  exposes an MCP endpoint, and provides a Chainlit chat UI
  for AI-powered coaching via OpenRouter.
  Supports multiple users with self-service onboarding.
url: "https://github.com/amasolov/health-coach"
image: "ghcr.io/amasolov/health-coach/healthcoach"
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
startup: services
boot: auto
ports:
  8765/tcp: 8765
  8080/tcp: 36850
ports_description:
  8765/tcp: MCP server (Streamable HTTP)
  8080/tcp: Health Coach (Chainlit, host port 36850)
map:
  - config:rw
options:
  sync_interval_minutes: 30
  mcp_port: 8765
  chat_port: 8080
  chat_model: "anthropic/claude-sonnet-4"
  chainlit_url: "https://healthcoach.ktmb1.net"
  allow_registration: false
  openrouter_api_key: ""
  openai_api_key: ""
  embedding_api_base: ""
  embedding_model: "text-embedding-3-small"
  google_oauth_client_id: ""
  google_oauth_client_secret: ""
  apple_oauth_client_id: ""
  apple_oauth_team_id: ""
  apple_oauth_key_id: ""
  apple_oauth_private_key_file: ""
  db_host: "77b2833f-timescaledb"
  db_port: 5432
  db_name: "health"
  db_user: ""
  db_password: ""
  grafana_host: "a0d7b954-grafana"
  grafana_port: 3000
  grafana_api_key: ""
  github_token: ""
  r2_account_id: ""
  r2_access_key_id: ""
  r2_secret_access_key: ""
  r2_bucket_name: "health-coach-ifit"
  telegram_bot_token: ""
  telegram_bot_username: ""
schema:
  sync_interval_minutes: "int(5,1440)"
  mcp_port: "int(1024,65535)"
  chat_port: "int(1024,65535)"
  chat_model: str
  chainlit_url: "str?"
